name: Release Obsidian Timestamp Utility

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  # Also fire on direct pushes to main (e.g. the merge commit of a release fix),
  # so the fixed release.sh is used even when no new PR close event re-triggers.
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    # Release when a PR was merged into main (pull_request closed+merged) OR on a
    # direct push to main (the merge commit itself). The checkout below uses ref: main,
    # so on a push event it tests the post-merge main (which contains the fix).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    env:
      REPO_NAME: obsidian-timestamp-utility
      # Set DRY_RUN=1 here (or via workflow_dispatch input) to build artifacts without publishing.
      DRY_RUN: ${{ vars.RELEASE_DRY_RUN || '0' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install npm dependencies (needed for `npm run build` -> dist/main.js)
        run: npm ci

      - name: Set Version
        id: set_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$VERSION" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "Andy Holst"
          git config user.email "andy.holst@protonmail.com"

      - name: Tag the release (local + push)
        if: ${{ env.DRY_RUN != '1' }}
        run: |
          git tag -f "${{ env.TAG }}"
          git push origin "${{ env.TAG }}" --force

      - name: Make scripts executable
        run: find . -name '*.sh' -exec chmod +x {} \;

      - name: Build and assemble release artifacts
        # make release calls scripts/release.sh, which generates release/release_notes.md
        # (from the current version's CHANGELOG section) and the downloadable zip.
        run: make release REPO_NAME=${{ env.REPO_NAME }} TAG=${{ env.TAG }} DRY_RUN=${{ env.DRY_RUN }}
        env:
          TAG: ${{ env.TAG }}

      - name: Guard — release notes must exist
        run: |
          if [ ! -f release/release_notes.md ]; then
            echo "::error::release/release_notes.md missing — release body would be empty. Aborting."
            exit 1
          fi
          echo "release_notes.md size: $(wc -c < release/release_notes.md) bytes"

      - name: Create GitHub Release and upload assets
        if: ${{ env.DRY_RUN != '1' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: release/release_notes.md
          draft: false
          prerelease: false
          files: |
            release/main.js
            release/manifest.json
            release/README.md
            release/CHANGELOG.md
            ${{ env.REPO_NAME }}-${{ env.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run summary (no publish)
        if: ${{ env.DRY_RUN == '1' }}
        run: |
          echo "DRY_RUN=1 — artifacts built locally, NO GitHub release created."
          ls -la release/
          ls -la ${{ env.REPO_NAME }}-${{ env.TAG }}.zip
