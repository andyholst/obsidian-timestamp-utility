name: Secret Scan (gitleaks)

# Replaces the broken TruffleHog Action with gitleaks, executed via the
# maintained gitleaks/gitleaks-action. The repo's .gitleaks.toml (useDefault=true
# plus repo-local allowlists) drives detection, so local hooks and CI share the
# exact same ruleset. On a detected secret the job fails and the push/PR is blocked.

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point the action at the repo's config (defaults to .gitleaks.toml anyway).
          GITLEAKS_CONFIG: .gitleaks.toml
          # Fail the build on any finding.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
