services:
  agentics:
    image: agentics
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    build:
      context: ..
      dockerfile: containers/agents/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - ..:/project
      - /home/asimov/repository/git/projects/obsidian-timestamp-utility/agents/agentics/src:/app/prod
      - /home/asimov/repository/git/projects/obsidian-timestamp-utility/node_modules:/project/node_modules
    environment:
      - PROJECT_ROOT=/project
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Rootless nerdctl/colima on macOS: --net=host shares the host loopback, so containers
      # can reach llama at http://127.0.0.1:11434 directly. `host.lima.internal` does NOT
      # resolve under rootless nerdctl (returns 000) — must use 127.0.0.1.
      - LLAMA_HOST=http://127.0.0.1:11434
      - LLAMA_REASONING_MODEL=${LLAMA_REASONING_MODEL:-qwen3.6-35b-a3b}
      - LLAMA_CODE_MODEL=${LLAMA_CODE_MODEL:-qwen3.6-35b-a3b}
      - CHANGE=${CHANGE}
      - PYTHONDONTWRITEBYTECODE=1
    # Rootless nerdctl: these services use `network_mode: host`, so the container shares the
    # host loopback. llama is bound to 127.0.0.1:11434 on the host, so the container reaches it
    # at http://127.0.0.1:11434 (verified: 200 from inside the container). `host.docker.internal`
    # does NOT resolve under rootless nerdctl and must NOT be used (it returns 000).
    extra_hosts:
      - host.docker.internal:host-gateway
    network_mode: host
    # Default: run the agentic pipeline against a LOCAL OpenSpec change (no GitHub, no MCP).
    # Override with: docker compose -f docker-compose-files/agents.yaml run --rm agentics \
    #   python -m prod.agentics openspec:<change-name>
    command: python -m prod.agentics openspec:${CHANGE:-uuid-modal-agentic-generation}

  unit-test-agents:
    image: agentics
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    build:
      context: ..
      dockerfile: containers/agents/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - ../agents/agentics/src:/app/src
      - ../agents/agentics/tests:/app/tests
      - ..:/project
    environment:
      - PROJECT_ROOT=/project
      - GITHUB_TOKEN=dummy
      # Rootless nerdctl/colima on macOS: --net=host shares the host loopback, so containers
      # can reach llama at http://127.0.0.1:11434 directly. `host.lima.internal` does NOT
      # resolve under rootless nerdctl (returns 000) — must use 127.0.0.1.
      - LLAMA_HOST=http://127.0.0.1:11434
      - LLAMA_REASONING_MODEL=${LLAMA_REASONING_MODEL:-qwen3.6-35b-a3b}
      - LLAMA_CODE_MODEL=${LLAMA_CODE_MODEL:-qwen3.6-35b-a3b}
      - PYTHONPATH=/app
      - TEST_FILTER=${TEST_FILTER}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - PYTHONDONTWRITEBYTECODE=1
    # Rootless nerdctl: this service uses `network_mode: host`, so the container shares the
    # host loopback. llama is bound to 127.0.0.1:11434 on the host, reachable at
    # http://127.0.0.1:11434 (verified: 200 from inside the container). `host.docker.internal`
    # does NOT resolve under rootless nerdctl and must NOT be used (returns 000).
    extra_hosts:
      - host.docker.internal:host-gateway
    command: ["bash", "-c", "cd /app && eval \"python -m pytest tests/unit/ -vv -s --tb=long ${TEST_FILTER}\""]
    network_mode: host

  integration-test-agents:
    image: agentics
    user: root
    build:
      context: ..
      dockerfile: containers/agents/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - ../agents/agentics/src:/app/src
      - ../agents/agentics/tests:/app/tests
      - ..:/app
      - ..:/project
      - ../logs:/app/logs
      - ../agents/agentics/.cache/huggingface:/tmp/.cache/huggingface
    environment:
      - PROJECT_ROOT=/app
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Rootless nerdctl/colima on macOS: --net=host shares the host loopback, so containers
      # can reach llama at http://127.0.0.1:11434 directly. `host.lima.internal` does NOT
      # resolve under rootless nerdctl (returns 000) — must use 127.0.0.1.
      - LLAMA_HOST=http://127.0.0.1:11434
      - LLAMA_REASONING_MODEL=${LLAMA_REASONING_MODEL:-qwen3.6-35b-a3b}
      - LLAMA_CODE_MODEL=${LLAMA_CODE_MODEL:-qwen3.6-35b-a3b}
      - TEST_ISSUE_URL=${TEST_ISSUE_URL:-https://github.com/andyholst/obsidian-timestamp-utility}
      - PYTHONPATH=/app
      - TEST_FILTER=${TEST_FILTER}
      - LLAMA_TIMEOUT=${LLAMA_TIMEOUT:-300}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - PYTHONDONTWRITEBYTECODE=1
    # Skip e2e tests during loop-harness (they're for full e2e only)
    command: ["bash", "-c", "cd /app && eval \"python -m pytest tests/integration/ -vv -s --tb=long -m 'not e2e' ${TEST_FILTER}\""]
    network_mode: host

# Rootless nerdctl CNI fix: pin a UNIQUE default-network subnet per compose file so
# `docker compose run` does not collide with other projects' 10.4.0.0/24 default bridge
# (which caused "subnet 10.4.0.0/24 overlaps" and aborted the loop harness). Services here
# use network_mode: host, but nerdctl still provisions the project default bridge, so the
# unique subnet is required. 10.89.0.0/24 is verified free on this host.
networks:
  default:
    name: otu-agents-default
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24
