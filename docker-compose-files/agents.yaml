services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"

  ticket-interpreter-agent:
    build:
      context: ../agents/ticket-interpreter-node
      dockerfile: Dockerfile
    volumes:
      - ../agents/ticket-interpreter-node/src:/app/src
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}

  unit-test-agents:
    build:
      context: ../agents/ticket-interpreter-node
      dockerfile: Dockerfile
    volumes:
      - ../agents/ticket-interpreter-node/src:/app/src
      - ../agents/ticket-interpreter-node/tests:/app/tests
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    command: pytest /app/tests/unit

  integration-test-agents:
    build:
      context: ../agents/ticket-interpreter-node
      dockerfile: Dockerfile
    volumes:
      - ../agents/ticket-interpreter-node/src:/app/src
      - ../agents/ticket-interpreter-node/tests:/app/tests
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - TEST_ISSUE_URL=${TEST_ISSUE_URL}
    command: pytest /app/tests/integration
    depends_on:
      - ollama
