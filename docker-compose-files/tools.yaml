services:
  app:
    build:
      context: ..
      dockerfile: containers/npm/Dockerfile
    stdin_open: false
    tty: false
    volumes:
    - ../:/app
    - ../node_modules:/app/node_modules
    working_dir: /app
    environment:
    - TAG=${TAG:-v0.1.0}
    - REPO_NAME=${REPO_NAME:-obsidian-timestamp-utility}

# Rootless nerdctl CNI fix: unique default-network subnet (see agents.yaml note).
# 10.88.0.0/24 is verified free on this host.
networks:
  default:
    name: otu-tools-default
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.0.0/24
