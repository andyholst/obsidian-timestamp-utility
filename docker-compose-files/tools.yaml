services:
  app:
    build:
      context: ..
      dockerfile: containers/npm/Dockerfile
    stdin_open: false
    tty: false
    volumes:
    - ../:/app
    - /home/asimov/repository/git/projects/obsidian-timestamp-utility/node_modules:/app/node_modules
    working_dir: /app
    environment:
    - TAG=${TAG:-v0.1.0}
    - REPO_NAME=${REPO_NAME:-obsidian-timestamp-utility}
